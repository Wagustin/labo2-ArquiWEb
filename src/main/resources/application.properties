spring.application.name=proveedores
spring.datasource.url=jdbc:postgresql://localhost:5432/db_proveedores
spring.datasource.username=postgres
spring.datasource.password=Cachem409$
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging para ver qué pasa con la DB
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

#No envia el trace al usuario cuando hay error.
server.error.include-stacktrace=never
